<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script defer type="module" src="js/main.js"></script>
    <title>Calculator</title>
</head>
<body>
    <div id="calculator-ctnr">
        <div id="screen-ctnr">
            <div id="screen-header">
                <p>Odin-calc</p>
                <p>Retrocalculator</p>
            </div>
            <div id="screen-display">
                <p id="display-text">0123456789</p>
            </div>
        </div>

        <div id="keyboard-ctnr">
            <div id="left-keys-ctnr">
                <div class="row">
                    <button id="clear-btn" class="lightgrey" data-value="clear">C</button>
                    <button id="divide-btn" class="lightgrey" data-value="divide">÷</button>
                    <button id="multiply-btn" class="lightgrey" data-value="multiply">X</button>
                    <button id="correct-btn" class="lightgrey" data-value="correct">←</button>
                </div>
                <div class="row">
                    <button id="seven-btn" class="darkgrey" data-value="7">7</button>
                    <button id="eight-btn" class="darkgrey" data-value="8">8</button>
                    <button id="nine-btn" class="darkgrey" data-value="9">9</button>
                    <button id="substract-btn" class="lightgrey" data-value="substract">-</button>
                </div>
                <div class="row">
                    <button id="four-btn" class="darkgrey" data-value="4">4</button>
                    <button id="five-btn" class="darkgrey" data-value="5">5</button>
                    <button id="six-btn" class="darkgrey" data-value="6">6</button>
                    <button id="add-btn" class="lightgrey" data-value="add">+</button>
                </div>
                <div class="row-bottom">
                    <div class="symmetric-row">
                        <div class="row">
                            <button id="one-btn" class="darkgrey" data-value="1">1</button>
                            <button id="two-btn" class="darkgrey" data-value="2">2</button>
                            <button id="three-btn" class="darkgrey" data-value="3">3</button>
                        </div>
                        <div class="row">
                            <button id="zero-btn" class="darkgrey" data-value="0">0</button>
                            <button id="dot-btn" class="darkgrey" data-value="dot">.</button>
                        </div>
                    </div>
                    <div class="asymmetric-row">
                        <button id="equal-btn" class="lightgrey" data-value="equal">ENTER</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
